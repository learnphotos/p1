name: DownPhotos

on:
  push:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: GetPics
        # run: wget --adjust-extension --local-encoding=UTF-8 --no-parent -k --retry-on-http-error=429 -i input.txt
        run: |
          declare -A seen_domains

          rename_padded() {
            local root="$1"
            local width=4

            process_dir() {
              local dir="$1"
              local f base ext new tmp num n idx
              local -A used_numbers=()
              local -a files=()
              local -a tmps=()
              local -a dests=()

              while IFS= read -r -d '' f; do
                base="${f##*/}"

                if [[ "$base" =~ ^([0-9]{4})(\..*)?$ ]]; then
                  num=$((10#${BASH_REMATCH[1]}))
                  used_numbers["$num"]=1
                else
                  files+=("$f")
                fi
              done < <(find "$dir" -maxdepth 1 -type f -print0 | sort -z)

              n=1

              for f in "${files[@]}"; do
                base="${f##*/}"

                if [[ "$base" == *.* && "$base" != .* ]]; then
                  ext=".${base##*.}"
                else
                  ext=""
                fi

                while [[ -n "${used_numbers[$n]+x}" ]]; do
                  ((n++))
                done

                printf -v new "%s/%0${width}d%s" "$dir" "$n" "$ext"

                while [[ -e "$new" ]]; do
                  used_numbers["$n"]=1
                  ((n++))

                  while [[ -n "${used_numbers[$n]+x}" ]]; do
                    ((n++))
                  done

                  printf -v new "%s/%0${width}d%s" "$dir" "$n" "$ext"
                done

                tmp="$dir/.rename_tmp_$$.$n"
                while [[ -e "$tmp" ]]; do
                  tmp="$dir/.rename_tmp_$$.$n.$RANDOM"
                done

                mv -- "$f" "$tmp"

                tmps+=("$tmp")
                dests+=("$new")
                used_numbers["$n"]=1

                ((n++))
              done

              for idx in "${!tmps[@]}"; do
                mv -- "${tmps[$idx]}" "${dests[$idx]}"
              done
            }

            while IFS= read -r -d '' dir; do
              process_dir "$dir"
            done < <(find "$root" -type d -print0 | sort -z)
          }

          while IFS= read -r url || [ -n "$url" ]; do
            url=${url%$'\r'}

            [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue

            if [[ "$url" != http://* && "$url" != https://* ]]; then
              full_url="https://$url"
              domain="${url%%/*}"
            else
              full_url="$url"
              domain="${url#*://}"
              domain="${domain%%/*}"
            fi

            mkdir -p "$domain"
            seen_domains["$domain"]=1

            wget \
              --adjust-extension \
              --local-encoding=UTF-8 \
              --no-parent \
              -k \
              --retry-on-http-error=429 \
              -P "$domain" \
              "$full_url"

          done < input.txt

          for domain in "${!seen_domains[@]}"; do
            rename_padded "$domain"
          done


      - name: Download
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: GetStudying
          file_pattern: '*'
